<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bounce — Add a Card Flow</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;700&family=Unbounded:wght@600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Work Sans', sans-serif;
      background: #0e0e0e;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; padding: 24px;
    }
    .phone {
      width: 393px; height: 852px;
      position: relative; overflow: hidden;
      background: #fff; border-radius: 44px;
      box-shadow: 0 30px 90px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.08);
    }
    .screen {
      position: absolute; inset: 0;
    }
    .screen-wrap {
      position: absolute; inset: 0;
    }
    @keyframes slideEnterRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes slideEnterLeft  { from { transform: translateX(-100%); } to { transform: translateX(0); } }
    @keyframes slideExitRight  { from { transform: translateX(0); } to { transform: translateX(100%); } }
    @keyframes slideExitLeft   { from { transform: translateX(0); } to { transform: translateX(-30%); } }
    .slide-enter-right { animation: slideEnterRight .32s cubic-bezier(.25,.46,.45,.94) both; }
    .slide-enter-left  { animation: slideEnterLeft  .32s cubic-bezier(.25,.46,.45,.94) both; }
    .slide-exit-right  { animation: slideExitRight  .32s cubic-bezier(.25,.46,.45,.94) both; }
    .slide-exit-left   { animation: slideExitLeft   .32s cubic-bezier(.25,.46,.45,.94) both; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .fade-in { animation: fadeIn .22s ease both; }

    @keyframes scanLine {
      0%   { top: 0%; opacity: 1; }
      48%  { top: 92%; opacity: 1; }
      50%  { top: 92%; opacity: 0; }
      52%  { top: 0%;  opacity: 0; }
      54%  { top: 0%;  opacity: 1; }
      100% { top: 0%;  opacity: 1; }
    }
    .scan-line {
      position: absolute; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, #d8f835 30%, #d8f835 70%, transparent);
      animation: scanLine 1.6s ease-in-out infinite;
      border-radius: 1px;
    }
    @keyframes toastIn  { from { transform: translateY(130px); } to { transform: translateY(0); } }
    @keyframes toastOut { from { transform: translateY(0); } to { transform: translateY(130px); } }
    .toast-in  { animation: toastIn  .32s cubic-bezier(.25,.46,.45,.94) both; }
    .toast-out { animation: toastOut .28s cubic-bezier(.55,0,.45,1)    both; }

    /* Press state for gray buttons */
    .btn-gray { background: #f8f8f8; }
    .btn-gray:active { background: #E0DFE0 !important; }

    /* Peek card slide-in */
    @keyframes cardPeekIn { from { transform: translateY(57px); } to { transform: translateY(0); } }
    .card-peek-in { animation: cardPeekIn .38s cubic-bezier(.25,.46,.45,.94); }

    @keyframes bounceHandle { 0%,100%{transform:translateY(0) translateX(-50%);} 50%{transform:translateY(-7px) translateX(-50%);} }
    .bounce-handle { animation: bounceHandle 1.2s ease-in-out infinite; }
    @keyframes spinLoader { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

    /* Bounce card shimmer */
    .bounce-card {
      background: #d8f835;
      background-image:
        radial-gradient(ellipse at 90% 120%, rgba(255,255,255,0.38) 0%, transparent 50%),
        radial-gradient(ellipse at 10% -20%, rgba(255,255,255,0.18) 0%, transparent 45%);
    }
    .gray-card {
      background: linear-gradient(145deg, #e0dfe0 0%, #f8f8f8 50%, #e0dfe0 100%);
    }
    input:focus { outline: none; }
    input::placeholder { color: #989496; }
    button { font-family: 'Work Sans', sans-serif; }

    /* Scrollable card list */
    .card-scroll {
      position: absolute; top: 0; left: 0; right: 0; bottom: 74px;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    .card-scroll::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>

/* ── Shared atoms ── */
function NavIconBtn({ onClick, children, style = {} }) {
  const [pressed, setPressed] = useState(false);
  return (
    <button onClick={onClick}
      onMouseDown={() => setPressed(true)} onMouseUp={() => setPressed(false)}
      onMouseLeave={() => setPressed(false)} onTouchStart={() => setPressed(true)} onTouchEnd={() => setPressed(false)}
      style={{
        width: 40, height: 40, borderRadius: 100,
        border: `1px solid ${C.gray100}`,
        background: pressed ? '#E0DFE0' : '#F8F8F8',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        cursor: 'pointer', flexShrink: 0, transition: 'background 0.1s', ...style,
      }}
    >{children}</button>
  );
}

const BackBtn = ({ onPress, top = 62 }) => (
  <NavIconBtn onClick={onPress} style={{ position: 'absolute', left: 16, top }}>
    <Icon.ChevronLeft />
  </NavIconBtn>
);

function PrimaryBtn({ label, onClick, disabled, style = {} }) {
  const [pressed, setPressed] = useState(false);
  const bg = disabled ? C.limeDis : pressed ? '#CDEF1E' : C.lime;
  return (
    <button
      onClick={disabled ? undefined : onClick}
      onMouseDown={() => !disabled && setPressed(true)}
      onMouseUp={() => setPressed(false)}
      onMouseLeave={() => setPressed(false)}
      onTouchStart={() => !disabled && setPressed(true)}
      onTouchEnd={() => setPressed(false)}
      style={{
        position: 'absolute', bottom: 16, left: 16, right: 16,
        height: 42, borderRadius: 128, border: 'none',
        background: bg,
        color: disabled ? C.textDis : C.black,
        fontSize: 16, fontWeight: 600, cursor: disabled ? 'default' : 'pointer',
        transition: 'background .15s', ...style,
      }}
    >
      {label}
    </button>
  );
}

function SecondaryBtn({ label, onClick, style = {} }) {
  const [pressed, setPressed] = useState(false);
  return (
    <button onClick={onClick}
      onMouseDown={() => setPressed(true)} onMouseUp={() => setPressed(false)}
      onMouseLeave={() => setPressed(false)} onTouchStart={() => setPressed(true)} onTouchEnd={() => setPressed(false)}
      style={{
        height: 42, borderRadius: 128,
        background: pressed ? '#E0DFE0' : '#F8F8F8',
        border: '1px solid #CBCACB',
        fontSize: 16, fontWeight: 600, letterSpacing: -0.16,
        color: C.black, cursor: 'pointer',
        fontFamily: 'Work Sans,sans-serif',
        transition: 'background 0.1s',
        ...style,
      }}
    >{label}</button>
  );
}

function TextField({ label, value, onChange, placeholder, type = 'text', readOnly, maxLength, style = {} }) {
  const [focused, setFocused] = useState(false);
  const floated = focused || (value != null && value.length > 0);

  return (
    <div style={{ height: 58, position: 'relative', ...style }}>
      {readOnly ? (
        /* Read-only: always show label + value stacked */
        <div style={{ position: 'absolute', bottom: 17, left: 0, right: 0 }}>
          <div style={{ fontSize: 12, color: C.gray400, marginBottom: 3, letterSpacing: 0.24 }}>{label}</div>
          <div style={{ fontSize: 14, color: C.black, letterSpacing: 0.28 }}>{value}</div>
        </div>
      ) : (
        /* Editable: floating label pattern */
        <>
          <span style={{
            position: 'absolute', left: 0, pointerEvents: 'none',
            top: floated ? 4 : 21,
            fontSize: floated ? 12 : 14,
            color: focused ? C.black : C.gray400,
            letterSpacing: floated ? 0.24 : 0.28,
            lineHeight: '1.4',
            transition: 'top .17s ease, font-size .17s ease, color .17s ease',
          }}>
            {floated ? label : (placeholder || label)}
          </span>
          <input
            type={type} value={value} onChange={onChange} maxLength={maxLength}
            onFocus={() => setFocused(true)}
            onBlur={() => setFocused(false)}
            style={{
              position: 'absolute', bottom: 17, left: 0, right: 0, width: '100%',
              fontSize: 14, color: C.black, border: 'none', background: 'transparent',
              padding: 0, fontFamily: 'Work Sans,sans-serif',
            }}
          />
        </>
      )}
      <div style={{ position: 'absolute', bottom: 16, left: 0, right: 0, height: 1,
        background: focused ? C.black : C.black }} />
    </div>
  );
}

const BottomNav = ({ onHome } = {}) => (
  <div style={{
    position: 'absolute', bottom: 0, left: 0, right: 0, height: 74,
    background: C.white, borderTop: `1px solid ${C.gray100}`,
    display: 'flex', alignItems: 'center', justifyContent: 'space-around',
    paddingTop: 20, paddingBottom: 8,
    zIndex: 10,

    <button onClick={onHome} style={{ background:'none', border:'none', padding:0, cursor: onHome ? 'pointer' : 'default', display:'flex', alignItems:'center', justifyContent:'center' }}>
      <Icon.HomeOutline />
    </button>
    <Icon.People />
    <div style={{ position: 'relative', top: -1 }}><Icon.CardPerson /></div>
    <Icon.Bell />
    <div style={{
      width: 24, height: 24, borderRadius: '50%', background: '#b8956a',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontSize: 9, fontWeight: 700, color: C.white, letterSpacing: 0.3,
    }}>AB</div>
  </div>
);

/* ── Card visuals ── */
const BouncePayCard = () => (
  <div className="bounce-card" style={{
    width: '100%', height: 203, borderRadius: 16,
    position: 'relative', overflow: 'hidden', flexShrink: 0,
  }}>

/* Small branded list icons (32×32) */
const ListIcon = ({ id }) => {
  const wrap = (bg, el) => (
    <div style={{ width:32, height:32, borderRadius:'50%', background:bg, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
      {el}
    </div>
  );
  if (id === 'interac')   return wrap('#FFD100',                                  <span style={{ color:'#231F20', fontWeight:900, fontSize:7, letterSpacing:'.2px' }}>INTERAC</span>);
  if (id === 'rbc-debit') return wrap('#005daa',                                  <span style={{ color:'#fff', fontWeight:800, fontSize:9  }}>RBC</span>);
  if (id === 'desj-eft')  return wrap('linear-gradient(135deg,#f7a800,#e05c00)', <span style={{ color:'#fff', fontWeight:800, fontSize:8  }}>Des</span>);
  if (id === 'rbc-visa')  return wrap(C.white,                                    <span style={{ fontFamily:'Georgia,serif', fontWeight:700, fontSize:12, color:'#1A1F71', letterSpacing:'-0.5px' }}>VISA</span>);
  if (id === 'add')       return wrap(C.gray100, <Icon.Plus />);
  if (id.startsWith('eft-')) return wrap(C.gray100, <Icon.Bank />);
  return wrap(C.gray100, <Icon.CreditCard />);
};

/* ══════════════════════════════════════════════════
   SCREEN — Withdraw amount entry
══════════════════════════════════════════════════ */
function WithdrawFundsScreen({ onBack, bankName, bankId, isInterac, forTitle, onForTitleChange, balance, onComplete, onChangeMethod }) {
  const [amount, setAmount] = useState('');
  const [keyboardMounted, setKeyboardMounted] = useState(false);
  const [keyboardOpen,    setKeyboardOpen]    = useState(false);
  const [showTitleInput,  setShowTitleInput]  = useState(false);
  const titleInputRef = useRef(null);
  const amountRef = useRef('');

  const openKeyboard = () => { setKeyboardMounted(true); setTimeout(() => setKeyboardOpen(true), 10); };
  const closeKeyboard = () => { setKeyboardOpen(false); setTimeout(() => setKeyboardMounted(false), 310); };

  const [displayDragY, setDisplayDragY] = useState(0);
  const [isDragging,   setIsDragging]   = useState(false);
  const [isCompleting, setIsCompleting] = useState(false);
  const [showSpinner,  setShowSpinner]  = useState(false);
  const isDraggingRef   = useRef(false);
  const dragStartRef    = useRef(0);
  const currentDragYRef = useRef(0);

  const pressKey = (k) => {
    setAmount(prev => {
      if (k === '⌫') { const n = prev.slice(0,-1); amountRef.current = n; return n; }
      if (k === '.' && prev.includes('.')) return prev;
      const parts = prev.split('.');
      if (prev.includes('.') && parts[1]?.length >= 2) return prev;
      if (!prev && k === '.') { amountRef.current = '0.'; return '0.'; }
      if (prev === '0' && k !== '.') return prev;
      if (prev.replace(/[^0-9]/g,'').length >= 8) return prev;
      const n = prev + k; amountRef.current = n; return n;
    });
  };

  const numVal = parseFloat(amount) || 0;
  const hasAmt = numVal > 0;
  const isCreditCard = bankId === 'rbc-visa' || bankId === 'new-credit';
  const feeAmt = isCreditCard ? numVal * 0.0175 : 0;
  const feeDisplay = '$' + feeAmt.toLocaleString('en-CA', { minimumFractionDigits:2, maximumFractionDigits:2 });

  const formatDisplay = (amt) => {
    if (!amt) return { int: '0', dec: '.00' };
    if (amt.endsWith('.')) return { int: Number(amt.slice(0,-1)).toLocaleString('en-CA'), dec: '.' };
    if (amt.includes('.')) {
      const [i, d] = amt.split('.');
      return { int: Number(i||'0').toLocaleString('en-CA'), dec: '.' + d };
    }
    return { int: Number(amt).toLocaleString('en-CA'), dec: '.00' };
  };

  const { int: dispInt, dec: dispDec } = formatDisplay(amount);
  const balFmt = (balance || 0).toLocaleString('en-CA', { minimumFractionDigits:2, maximumFractionDigits:2 });
  const amtColor = hasAmt ? C.black : '#989496';

  const waveVisible = keyboardMounted ? 42 : (hasAmt ? 128 : 42);
  const waveWrapperBase = 852 - waveVisible;
  const waveWrapperTop = isCompleting
    ? -WAVE_H
    : Math.max(-WAVE_H, waveWrapperBase + displayDragY);
  const waveTransition = isCompleting
    ? 'top 0.45s cubic-bezier(.25,.46,.45,.94)'
    : isDragging ? 'none'
    : 'top 300ms ease';

  const swipeProgress = Math.min(1, Math.abs(displayDragY) / (852 - waveVisible));
  const showSwipeUI = hasAmt && !keyboardMounted && !isCompleting;

  const handlePointerDown = (e) => {
    if (isCompleting || keyboardMounted || !hasAmt) return;
    e.preventDefault();
    const startY = e.touches ? e.touches[0].clientY : e.clientY;
    dragStartRef.current = startY;
    currentDragYRef.current = 0;
    isDraggingRef.current = true;
    setIsDragging(true);
    const onMove = (ev) => {
      if (!isDraggingRef.current) return;
      const y = ev.touches ? ev.touches[0].clientY : ev.clientY;
      const dy = Math.min(0, y - dragStartRef.current);
      currentDragYRef.current = dy;
      setDisplayDragY(dy);
    };
    const onUp = () => {
      isDraggingRef.current = false;
      setIsDragging(false);
      const dy = currentDragYRef.current;
      if (dy < -150) {
        setIsCompleting(true);
        setDisplayDragY(-852);
        setTimeout(() => setShowSpinner(true), 450);
        setTimeout(() => onComplete(amountRef.current), 1900);
      } else {
        setDisplayDragY(0);
      }
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('touchend', onUp);
  };

  useEffect(() => { amountRef.current = amount; }, [amount]);
  useEffect(() => {
    if (showTitleInput && titleInputRef.current) titleInputRef.current.focus();
  }, [showTitleInput]);

  return (
    <div className="screen" style={{ background: C.white, overflow:'hidden' }}>
      <BackBtn onPress={isCompleting ? undefined : onBack} />

      {/* Title */}
      <p style={{ position:'absolute', top:70, left:0, right:0, textAlign:'center', fontSize:18, fontWeight:600, color:C.black, margin:0, lineHeight:1.3 }}>
        Withdraw
      </p>

      {/* "From" row — always Bounce Pay */}
      <div style={{ position:'absolute', top:166, left:32, right:32, display:'flex', alignItems:'flex-start', justifyContent:'space-between' }}>
        <span style={{ fontSize:18, fontWeight:400, color:C.black, lineHeight:1.3, whiteSpace:'nowrap' }}>From</span>
        <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:4 }}>
          <div style={{ display:'flex', alignItems:'center', gap:4 }}>
            <div style={{ width:24, height:24, borderRadius:'50%', background:C.lime, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
              <img src="assets/bounce_logo.svg" alt="" style={{ width:13.5, height:13.5, objectFit:'contain' }} />
            </div>
            <span style={{ fontSize:18, fontWeight:600, color:C.black, lineHeight:1.3, whiteSpace:'nowrap' }}>Bounce Pay</span>
          </div>
          <span style={{ fontSize:12, fontWeight:400, color:C.black, letterSpacing:0.24, lineHeight:1.4 }}>Available Balance: ${balFmt}</span>
        </div>
      </div>

      {/* "You're withdrawing" + amount */}
      <div
        onClick={openKeyboard}
        style={{ position:'absolute', left:0, right:0, top:'calc(50% - 40px)', transform:'translateY(-50%)', display:'flex', flexDirection:'column', alignItems:'center', textAlign:'center', cursor:'pointer' }}
      >
        <p style={{ fontSize:16, fontWeight:400, color:C.black, margin:'0 0 4px', letterSpacing:0.32, lineHeight:1.4 }}>You're withdrawing</p>
        <p style={{ fontSize:48, fontWeight:700, color:amtColor, margin:0, lineHeight:1.3, letterSpacing:'-1px' }}>
          <span>$</span><span style={{ textDecoration:'underline', textDecorationSkipInk:'none' }}>{dispInt}{dispDec}</span>
        </p>
      </div>

      {/* Detail rows — For, To, Arrives by */}
      <div style={{ position:'absolute', bottom:146, left:32, right:32, display:'flex', flexDirection:'column', gap:16 }}>
        <div onClick={() => setShowTitleInput(true)} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', cursor:'pointer' }}>
          <span style={{ fontSize:18, fontWeight:400, color:C.black, lineHeight:1.3, whiteSpace:'nowrap' }}>For</span>
          <span style={{ fontSize:18, fontWeight:600, lineHeight:1.3, textDecoration: forTitle ? 'none' : 'underline', textDecorationSkipInk:'none', color: forTitle ? C.black : '#989496' }}>
            {forTitle || 'Title (Optional)'}
          </span>
        </div>
        <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between' }}>
          <span style={{ fontSize:18, fontWeight:400, color:C.black, lineHeight:1.3, paddingTop:2 }}>To</span>
          <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:4 }}>
            <div onClick={onChangeMethod} style={{ display:'flex', alignItems:'center', gap:4, cursor:'pointer' }}>
              <ListIcon id={bankId} />
              <span style={{ fontSize:18, fontWeight:600, color:C.black, lineHeight:1.3, whiteSpace:'nowrap', textDecoration:'underline', textDecorationSkipInk:'none' }}>{bankName}</span>
            </div>
            {isInterac && <span style={{ fontSize:12, fontWeight:400, color:C.black, letterSpacing:0.24, lineHeight:1.4, textAlign:'right' }}>sofiya_p@example.com</span>}
          </div>
        </div>
        {isCreditCard && (
          <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between' }}>
            <span style={{ fontSize:18, fontWeight:400, color:C.black, lineHeight:1.3, whiteSpace:'nowrap', paddingTop:2 }}>Total charged</span>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:2 }}>
              <span style={{ fontSize:18, fontWeight:600, color:C.black, lineHeight:1.3, whiteSpace:'nowrap' }}>{'$' + (numVal + feeAmt).toLocaleString('en-CA', { minimumFractionDigits:2, maximumFractionDigits:2 })}</span>
              <span style={{ fontSize:12, fontWeight:400, color:C.gray400, letterSpacing:0.24, lineHeight:1.4, whiteSpace:'nowrap' }}>incl. {feeDisplay} processing fee</span>
            </div>
          </div>
        )}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <span style={{ fontSize:18, fontWeight:400, color:C.black, lineHeight:1.3, whiteSpace:'nowrap' }}>Arrives by</span>
          <span style={{ fontSize:18, fontWeight:600, color:C.black, lineHeight:1.3, whiteSpace:'nowrap' }}>{bankId === 'desj-eft' ? 'Tomorrow' : 'Right away'}</span>
        </div>
      </div>

      {/* Wave wrapper — rises on swipe */}
      <div style={{
        position:'absolute', left:0, right:0,
        top: waveWrapperTop,
        height: WAVE_H + 852,
        zIndex: 10,
        transition: waveTransition,
        pointerEvents: 'none',
      }}>
        <svg width="100%" height={WAVE_H + 852} viewBox="0 0 393 969" preserveAspectRatio="none" style={{display:'block'}}>
          <path d="M0 968.466H392.5V22.4658H317.802C290.126 22.4658 262.642 17.8702 236.472 8.86645L223.349 4.35177C206.604 -1.40898 188.422 -1.45142 171.651 4.23109L156.857 9.24357C131.015 17.9993 103.915 22.4658 76.6305 22.4658H0V968.466Z" fill="url(#waveGradWd)"/>
          <defs>
            <linearGradient id="waveGradWd" x1="263" y1="5.46575" x2="263" y2="968.466" gradientUnits="userSpaceOnUse">
              <stop stopColor="#D8F835"/>
              <stop offset="1" stopColor="#F0FFA1"/>
            </linearGradient>
          </defs>
        </svg>
      </div>

      {/* Swipe arrow + label */}
      {showSwipeUI && (
        <>
          <div
            style={{
              position:'absolute', left:'50%',
              transform: 'translateX(-50%)',
              top: waveWrapperTop + 24,
              zIndex:15, cursor:'pointer', touchAction:'none',
              transition: isDragging ? 'none' : 'top 300ms ease',
            }}
            className={!isDragging ? 'bounce-handle' : ''}
            onMouseDown={handlePointerDown}

   SCREEN 3 — Add Funds (amount entry + swipe confirm)

const WAVE_H = 200; // explicit height for the wave image

function WithdrawAmountScreen({ onBack, bankName, bankId, isInterac, forTitle, onForTitleChange, balance, onComplete, onChangeMethod }) {
  const [amount, setAmount] = useState('');
  // Keyboard: two-state for mount+slide animation
  const [keyboardMounted, setKeyboardMounted] = useState(false);
  const [keyboardOpen,    setKeyboardOpen]    = useState(false);
  const [showTitleInput, setShowTitleInput] = useState(false);
  const titleInputRef = useRef(null);
  const amountRef = useRef('');

  const openKeyboard = () => {
    setKeyboardMounted(true);
    setTimeout(() => setKeyboardOpen(true), 10);
  };
  const closeKeyboard = () => {
    setKeyboardOpen(false);
    setTimeout(() => setKeyboardMounted(false), 310);
  };

  // Swipe state
  const [displayDragY, setDisplayDragY] = useState(0);
  const [isDragging, setIsDragging] = useState(false);
  const [isCompleting, setIsCompleting] = useState(false);
  const [showSpinner, setShowSpinner] = useState(false);
  const isDraggingRef = useRef(false);
  const dragStartRef = useRef(0);
  const currentDragYRef = useRef(0);

  const pressKey = (k) => {
    setAmount(prev => {
      if (k === '⌫') { const n = prev.slice(0,-1); amountRef.current = n; return n; }
      if (k === '.' && prev.includes('.')) return prev;
      const parts = prev.split('.');
      if (prev.includes('.') && parts[1]?.length >= 2) return prev;
      if (!prev && k === '.') { amountRef.current = '0.'; return '0.'; }
      if (prev === '0' && k !== '.') return prev;
      if (prev.replace(/[^0-9]/g,'').length >= 8) return prev;
      const n = prev + k; amountRef.current = n; return n;
    });
  };

  const numVal = parseFloat(amount) || 0;
  const hasAmt = numVal > 0;
  const isCreditCard = bankId === 'rbc-visa' || bankId === 'new-credit';
  const feeAmt = isCreditCard ? numVal * 0.0175 : 0;
  const feeDisplay = '$' + feeAmt.toLocaleString('en-CA', { minimumFractionDigits:2, maximumFractionDigits:2 });

  const formatDisplay = (amt) => {
    if (!amt) return { int: '0', dec: '.00' };
    if (amt.endsWith('.')) return { int: Number(amt.slice(0,-1)).toLocaleString('en-CA'), dec: '.' };
    if (amt.includes('.')) {
      const [i, d] = amt.split('.');
      return { int: Number(i||'0').toLocaleString('en-CA'), dec: '.' + d };
    }
    return { int: Number(amt).toLocaleString('en-CA'), dec: '.00' };
  };

  const { int: dispInt, dec: dispDec } = formatDisplay(amount);
  const balFmt = (balance || 0).toLocaleString('en-CA', { minimumFractionDigits:2, maximumFractionDigits:2 });
  const amtColor = hasAmt ? C.black : '#989496';

  // Wave positioning
  // Empty state / keyboard open: 5% = ~42px visible. Has amount + keyboard dismissed: 15% = ~128px
  const waveVisible = keyboardMounted ? 42 : (hasAmt ? 128 : 42);
  const waveWrapperBase = 852 - waveVisible;
  const waveWrapperTop = isCompleting
    ? -WAVE_H
    : Math.max(-WAVE_H, waveWrapperBase + displayDragY);
  const waveTransition = isCompleting
    ? 'top 0.45s cubic-bezier(.25,.46,.45,.94)'
    : isDragging ? 'none'
    : 'top 300ms ease';

  const swipeProgress = Math.min(1, Math.abs(displayDragY) / (852 - waveVisible));
  const showSwipeUI = hasAmt && !keyboardMounted && !isCompleting;

  const handlePointerDown = (e) => {
    if (isCompleting || keyboardMounted || !hasAmt) return;
    e.preventDefault();
    const startY = e.touches ? e.touches[0].clientY : e.clientY;
    dragStartRef.current = startY;
    currentDragYRef.current = 0;
    isDraggingRef.current = true;
    setIsDragging(true);
    const onMove = (ev) => {
      if (!isDraggingRef.current) return;
      const y = ev.touches ? ev.touches[0].clientY : ev.clientY;
      const dy = Math.min(0, y - dragStartRef.current);
      currentDragYRef.current = dy;
      setDisplayDragY(dy);
    };
    const onUp = () => {
      isDraggingRef.current = false;
      setIsDragging(false);
      const dy = currentDragYRef.current;
      if (dy < -150) {
        setIsCompleting(true);
        setDisplayDragY(-852);
        setTimeout(() => setShowSpinner(true), 450);
        setTimeout(() => onComplete(amountRef.current), 1900);
      } else {
        setDisplayDragY(0);
      }
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('touchend', onUp);
  };

  useEffect(() => { amountRef.current = amount; }, [amount]);
  useEffect(() => {
    if (showTitleInput && titleInputRef.current) titleInputRef.current.focus();
  }, [showTitleInput]);

  return (
    <div className="screen" style={{ background: C.white, overflow:'hidden' }}>
      <BackBtn onPress={isCompleting ? undefined : onBack} />

      {/* Title */}
      <p style={{ position:'absolute', top:70, left:0, right:0, textAlign:'center', fontSize:18, fontWeight:600, color:C.black, margin:0, lineHeight:1.3 }}>
        Add Funds
      </p>

      {/* "To" row */}
      <div style={{ position:'absolute', top:166, left:32, right:32, display:'flex', alignItems:'flex-start', justifyContent:'space-between' }}>
        <span style={{ fontSize:18, fontWeight:400, color:C.black, lineHeight:1.3, whiteSpace:'nowrap' }}>To</span>
        <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:4 }}>
          <div style={{ display:'flex', alignItems:'center', gap:4 }}>
            <div style={{ width:24, height:24, borderRadius:'50%', background:C.lime, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
              <img src="assets/bounce_logo.svg" alt="" style={{ width:13.5, height:13.5, objectFit:'contain' }} />
            </div>
            <span style={{ fontSize:18, fontWeight:600, color:C.black, lineHeight:1.3, whiteSpace:'nowrap' }}>Bounce Pay</span>
          </div>
          <span style={{ fontSize:12, fontWeight:400, color:C.black, letterSpacing:0.24, lineHeight:1.4 }}>Available Balance: ${balFmt}</span>
        </div>
      </div>

      {/* "You're adding" + amount — vertically centered */}
      <div
        onClick={openKeyboard}
        style={{ position:'absolute', left:0, right:0, top:'calc(50% - 40px)', transform:'translateY(-50%)', display:'flex', flexDirection:'column', alignItems:'center', textAlign:'center', cursor:'pointer' }}
      >
        <p style={{ fontSize:16, fontWeight:400, color:C.black, margin:'0 0 4px', letterSpacing:0.32, lineHeight:1.4 }}>You're adding</p>
        <p style={{ fontSize:48, fontWeight:700, color:amtColor, margin:0, lineHeight:1.3, letterSpacing:'-1px' }}>
          <span>$</span><span style={{ textDecoration:'underline', textDecorationSkipInk:'none' }}>{dispInt}{dispDec}</span>
        </p>
      </div>

      {/* Detail rows — For, From, Arrives by */}
      <div style={{ position:'absolute', bottom:146, left:32, right:32, display:'flex', flexDirection:'column', gap:16 }}>
        <div onClick={() => setShowTitleInput(true)} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', cursor:'pointer' }}>
          <span style={{ fontSize:18, fontWeight:400, color:C.black, lineHeight:1.3, whiteSpace:'nowrap' }}>For</span>
          <span style={{ fontSize:18, fontWeight:600, lineHeight:1.3, textDecoration: forTitle ? 'none' : 'underline', textDecorationSkipInk:'none', color: forTitle ? C.black : '#989496' }}>
            {forTitle || 'Title (Optional)'}
          </span>
        </div>
        <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between' }}>
          <span style={{ fontSize:18, fontWeight:400, color:C.black, lineHeight:1.3, paddingTop:2 }}>From</span>
          <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:4 }}>
            <div onClick={onChangeMethod} style={{ display:'flex', alignItems:'center', gap:4, cursor:'pointer' }}>
              <ListIcon id={bankId} />
              <span style={{ fontSize:18, fontWeight:600, color:C.black, lineHeight:1.3, whiteSpace:'nowrap', textDecoration:'underline', textDecorationSkipInk:'none' }}>{bankName}</span>
            </div>
            {isInterac && <span style={{ fontSize:12, fontWeight:400, color:C.black, letterSpacing:0.24, lineHeight:1.4, textAlign:'right' }}>sofiya_p@example.com</span>}
          </div>
        </div>

/* ══════════════════════════════════════════════════

function ScanCardScreen({ onBack, onManual, onScanned }) {
  const [phase, setPhase] = useState('scanning'); // 'scanning' | 'scanned'

  useEffect(() => {
    const t1 = setTimeout(() => setPhase('scanned'), 2600);
    const t2 = setTimeout(onScanned, 3800);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);

  const isScanning = phase === 'scanning';

  return (
    <div className="screen" style={{ background: C.white }}>
      <BackBtn onPress={onBack} />
      <p style={{ position:'absolute', top:134, left:16, fontSize:32, fontWeight:700, color:C.black, margin:0 }}>
        Add Card

      <p style={{ position:'absolute', top:184, left:16, right:16, fontSize:16, color:C.paragraph, lineHeight:1.4, margin:0 }}>
        Position you credit or debit card in the frame to scan it.

      {/* Camera viewport */}
      <div style={{
        position:'absolute', left:0, right:0, top:260, height:264,
        background:'#17191f', overflow:'hidden',

        {/* fake blurred scene */}

          position:'absolute', inset:0,
          backgroundImage:'linear-gradient(120deg,#2a2d38 0%,#1a1c24 50%,#33363f 100%)',

        <div style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.58)' }} />

        {/* Card cutout — clear window */}
        <div style={{
          position:'absolute', left:56, top:44, width:281, height:176,
          borderRadius:8,
          boxShadow:`0 0 0 9999px rgba(0,0,0,0.58)`,
          overflow:'hidden',
        }}>
          {/* border */}
          <div style={{
            position:'absolute', inset:0,
            border:`2px solid ${isScanning ? C.white : C.lime}`,
            borderRadius:8, zIndex:2,
            transition:'border-color .4s',
          }} />
          {/* scan animation */}
          {isScanning && <div className="scan-line" />}
          {/* scanned text blocks */}
          {!isScanning && <>
            <div style={{ position:'absolute', left:24, top:60, width:214, height:16, background:'rgba(255,255,255,0.82)', borderRadius:3 }} />
            <div style={{ position:'absolute', left:72, top:81, width:120, height:12, background:'rgba(255,255,255,0.82)', borderRadius:3 }} />

          </>}
        </div>

        {/* Corner accents */}
        {['tl','tr','bl','br'].map(pos => {
          const t = pos.startsWith('t') ? 40 : null;
          const b = pos.startsWith('b') ? 40 : null;
          const l = pos.endsWith('l') ? 52 : null;
          const r = pos.endsWith('r') ? 52 : null;
          const brt = pos === 'tl' ? '8px 0 0 0' : pos === 'tr' ? '0 8px 0 0' : pos === 'bl' ? '0 0 0 8px' : '0 0 8px 0';
          return (
            <div key={pos} style={{

              border:`3px solid ${isScanning ? 'rgba(255,255,255,0.4)' : C.lime}`,
              transition:'border-color .4s',
              // only show relevant sides
              borderTop:    pos.startsWith('t') ? `3px solid ${isScanning ? 'rgba(255,255,255,0.4)' : C.lime}` : 'none',
              borderBottom: pos.startsWith('b') ? `3px solid ${isScanning ? 'rgba(255,255,255,0.4)' : C.lime}` : 'none',
              borderLeft:   pos.endsWith('l')   ? `3px solid ${isScanning ? 'rgba(255,255,255,0.4)' : C.lime}` : 'none',
              borderRight:  pos.endsWith('r')   ? `3px solid ${isScanning ? 'rgba(255,255,255,0.4)' : C.lime}` : 'none',
            }} />
          );
        })}
      </div>

      {/* Enter Manually */}
      <button
        onClick={isScanning ? onManual : undefined}
        style={{
          position:'absolute', bottom:42, left:'50%', transform:'translateX(-50%)',
          background:'none', border:'none',
          borderBottom:`1px solid ${isScanning ? C.black : C.textDis}`,
          color: isScanning ? C.black : C.textDis,
          fontSize:16, cursor: isScanning ? 'pointer' : 'default',
          padding:'2px 4px', fontFamily:'Work Sans,sans-serif',
          whiteSpace:'nowrap', transition:'color .3s, border-color .3s',
        }}
      >
        Enter Manually
      </button>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   SCREEN 5 — Card Details (post-scan)
══════════════════════════════════════════════════ */
function CardDetailsScreen({ onBack, onContinue }) {
  const [form, setForm] = useState({ num:'4567 8901 2345 6789', name:'Johnathan Doe', exp:'12/28', cvv:'123' });
  const set = k => e => {
    let v = e.target.value;
    if (k === 'num') {
      v = v.replace(/\D/g,'').slice(0,16);
      v = v.replace(/(.{4})/g,'$1 ').trim();
    }
    if (k === 'exp') {
      v = v.replace(/\D/g,'').slice(0,4);
      if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2);
    }
    if (k === 'cvv') v = v.replace(/\D/g,'').slice(0,4);
    setForm(f => ({ ...f, [k]: v }));
  };

  const clean = s => s.replace(/\s/g,'').replace('/','');
  const valid = clean(form.num).length === 16 && form.name.trim().length > 2
             && clean(form.exp).length === 4  && form.cvv.length >= 3;

  return (
    <div className="screen" style={{ background: C.white }}>
      <BackBtn onPress={onBack} />
      <p style={{ position:'absolute', top:134, left:16, fontSize:32, fontWeight:700, color:C.black, margin:0 }}>
        Card Details
      </p>
      <p style={{ position:'absolute', top:184, left:16, right:16, fontSize:16, color:C.paragraph, lineHeight:1.4, margin:0 }}>
        Verify your card information.
      </p>
      <div style={{ position:'absolute', top:238, left:16, right:16 }}>
        <TextField label="Card Number"          value={form.num}  onChange={set('num')}  maxLength={19} />
        <TextField label="Cardholder Name"      value={form.name} onChange={set('name')} />
        <div style={{ display:'flex', gap:16 }}>
          <TextField label="Expiry (MM/YY)" value={form.exp}  onChange={set('exp')}  maxLength={5} style={{ flex:1 }} />
          <TextField label="CVV"            value={form.cvv}  onChange={set('cvv')}  maxLength={4} style={{ flex:1 }} />
        </div>
      </div>
      <PrimaryBtn label="Continue" onClick={onContinue} disabled={!valid} />
    </div>
  );
}

/* ══════════════════════════════════════════════════
   ROOT APP — state machine
══════════════════════════════════════════════════ */
function App() {
  const [screen,          setScreen]        = useState('ways-to-pay');
  const [prevScreen,      setPrev]          = useState(null);
  const [direction,       setDirection]     = useState('forward');
  const [transitionType,  setTransitionType]= useState('slide');
  const [inTransition,    setInTransition]  = useState(false);
  const inTransRef                          = useRef(false);
  const [navKey,          setNavKey]        = useState(0);
  const [showRBC,      setShowRBC]     = useState(false);
  const [toast,        setToast]       = useState(false);
  const [selectedBank,    setSelectedBank]   = useState(null);
  const [fundAmount,      setFundAmount]     = useState('');
  const [forTitle,        setForTitle]       = useState('');
  const [balance,         setBalance]        = useState(10000);
  const [selectedCardType,setSelectedCardType] = useState(null); // 'debit' | 'credit'
  const [newFundsCards,   setNewFundsCards]  = useState([]);
  const [fundsToast,      setFundsToast]     = useState(false);
  const [withdrawToast,   setWithdrawToast]  = useState(false);
  const [addMethodOrigin, setAddMethodOrigin] = useState('add-funds-list');
  const [selectedTx,      setSelectedTx]      = useState(null);

  const navigate = (next, dir) => {
    if (inTransRef.current) return;
    inTransRef.current = true;
    setPrev(screen);
    setScreen(next);
    setDirection(dir);
    setTransitionType('slide');
    setInTransition(true);
    setNavKey(k => k + 1);
  };

  const navigateFade = (next) => {
    if (inTransRef.current) return;
    inTransRef.current = true;
    setPrev(screen);
    setScreen(next);
    setTransitionType('fade');
    setInTransition(true);
    setNavKey(k => k + 1);
  };

  const go   = (next) => navigate(next, 'forward');
  const back = (to)   => navigate(to,   'back');

  const navigateDirect = (next) => {
    inTransRef.current = false;
    setInTransition(false);
    setPrev(screen);
    setScreen(next);
    setNavKey(k => k + 1);
  };

  const onAdded = () => {
    const label = selectedCardType === 'credit' ? 'New Credit Card' : 'New Debit Card';
    const id    = selectedCardType === 'credit' ? 'new-credit' : 'new-debit';
    const isCredit = selectedCardType === 'credit';
    setNewFundsCards(prev => [...prev.filter(c => c.id !== id), { id, label, sub:'Instant transfers', badge: isCredit ? '1.75% fee' : 'Free', badgeBg: isCredit ? C.gray400 : C.lime, badgeTxt: isCredit ? C.white : C.black }]);
    if (addMethodOrigin === 'add-funds-list') setFundsToast(true);
    navigate(addMethodOrigin, 'forward');
  };

  const onPlaidAddAccount = () => {
    const id = 'eft-' + Date.now();
    const newCard = { id, label: 'New EFT account', sub: 'Up to 3 business days', badge: 'Free', badgeBg: C.lime, badgeTxt: C.black, isBank: true };
    setNewFundsCards(prev => [...prev, newCard]);
    if (addMethodOrigin === 'withdraw-list') {
      setWithdrawToast(true);
      navigate('withdraw-list', 'forward');
    } else if (addMethodOrigin === 'withdraw-accounts') {
      setSelectedBank(newCard);
      navigate('withdraw-funds', 'forward');
    } else if (addMethodOrigin === 'add-funds-list') {
      setFundsToast(true);
      navigate('add-funds-list', 'forward');
    } else {
      // 'accounts' — mid add-funds change-method flow
      setSelectedBank(newCard);
      navigate('withdraw-amount', 'forward');
    }
  };

  const buildScreen = (id) => {
    switch (id) {
      case 'home':
        return <HomeScreen
          balance={balance}
          onGoToWaysToPay={() => navigateFade('ways-to-pay')}
          onTxSelect={(tx) => { setSelectedTx(tx); go('tx-detail'); }}
        />;
      case 'tx-detail':
        return <TxDetailScreen tx={selectedTx} onBack={() => back('home')} />;
      case 'ways-to-pay':
        return <WaysToPayScreen
          onAddCard={() => go('add-funds-list')}
          onWithdraw={() => go('withdraw-list')}
          newFundsCards={newFundsCards}
          toastVisible={toast}
          onToastDone={() => setToast(false)}
          balance={balance}
          onHome={() => navigateFade('home')}
        />;
      case 'add-funds-list':
        return <AddFundsListScreen
          onBack={() => back('ways-to-pay')}
          onSelect={(id) => {
            if (id === 'add') { setAddMethodOrigin('add-funds-list'); go('add-to-wallet'); }
            else {
              const allOpts = [...ADD_FUNDS_OPTIONS, ...newFundsCards];
              setSelectedBank(allOpts.find(o => o.id === id));
              go('withdraw-amount');
            }
          }}
          extraCards={newFundsCards}
          toastVisible={fundsToast}
          onToastDone={() => setFundsToast(false)}
          toastMessage={
            newFundsCards.length > 0
              ? `Your ${newFundsCards[newFundsCards.length - 1].label} was successfully added.`
              : 'Your card was successfully added.'
          }
        />;
      case 'withdraw-amount':
        return <WithdrawAmountScreen
          onBack={() => back('add-funds-list')}
          bankName={selectedBank?.label || ''}
          bankId={selectedBank?.id || ''}
          isInterac={selectedBank?.id === 'interac'}
          forTitle={forTitle}
          onForTitleChange={setForTitle}
          balance={balance}
          onComplete={(amt) => {
            setFundAmount(amt);
            navigateDirect(selectedBank?.id === 'interac' ? 'interac-complete' : 'success');
          }}
          onChangeMethod={() => go('accounts')}
        />;
      case 'withdraw-list':
        return <WithdrawListScreen
          onBack={() => back('ways-to-pay')}
          onSelect={(id) => {
            const bankOpts = [...ADD_FUNDS_OPTIONS.filter(o => ['interac','desj-eft'].includes(o.id)), ...newFundsCards.filter(c => c.isBank)];
            setSelectedBank(bankOpts.find(o => o.id === id));
            go('withdraw-funds');
          }}
          onAddBankAccount={() => { setAddMethodOrigin('withdraw-list'); go('plaid'); }}
          extraCards={newFundsCards}
          toastVisible={withdrawToast}
          onToastDone={() => setWithdrawToast(false)}
          toastMessage={(() => {
            const bankCards = newFundsCards.filter(c => c.isBank);
            return bankCards.length > 0 ? `Your ${bankCards[bankCards.length - 1].label} was successfully added.` : 'Your account was successfully added.';
          })()}
        />;
      case 'withdraw-funds':
        return <WithdrawFundsScreen
          onBack={() => back('withdraw-list')}
          bankName={selectedBank?.label || ''}
          bankId={selectedBank?.id || ''}
          isInterac={selectedBank?.id === 'interac'}
          forTitle={forTitle}
          onForTitleChange={setForTitle}
          balance={balance}
          onComplete={(amt) => {
            setFundAmount(amt);
            navigateDirect(selectedBank?.id === 'interac' ? 'withdraw-interac' : 'withdraw-success');
          }}
          onChangeMethod={() => go('withdraw-accounts')}
        />;
      case 'withdraw-accounts':
        return <AccountsScreen
          currentBankId={selectedBank?.id || ''}
          allOptions={[...ADD_FUNDS_OPTIONS.filter(o => ['interac','desj-eft'].includes(o.id)), ...newFundsCards.filter(c => c.isBank)]}
          onDismiss={() => back('withdraw-funds')}
          onConfirm={(newBank) => { setSelectedBank(newBank); back('withdraw-funds'); }}
          onAddPaymentMethod={() => { setAddMethodOrigin('withdraw-accounts'); go('plaid'); }}
          addLabel="Add a bank account"
        />;
      case 'withdraw-interac':
        return <WithdrawInteracCompleteScreen
          amount={fundAmount}
          onBackHome={() => {
            setBalance(b => b - (parseFloat(fundAmount) || 0));
            setForTitle('');
            setFundAmount('');
            navigate('ways-to-pay', 'forward');
          }}
        />;
      case 'withdraw-success':
        return <SuccessScreen
          amount={fundAmount}
          onBackHome={() => {
            setBalance(b => b - (parseFloat(fundAmount) || 0));
            setForTitle('');
            setFundAmount('');
            navigate('ways-to-pay', 'forward');
          }}
        />;
      case 'accounts':
        return <AccountsScreen
          currentBankId={selectedBank?.id || ''}
          allOptions={[...ADD_FUNDS_OPTIONS, ...newFundsCards]}
          onDismiss={() => back('withdraw-amount')}
          onConfirm={(newBank) => {
            setSelectedBank(newBank);
            back('withdraw-amount');
          }}
          onAddPaymentMethod={() => { setAddMethodOrigin('accounts'); go('add-to-wallet'); }}
        />;
      case 'interac-complete':
        return <InteracCompleteScreen
          amount={fundAmount}
          onBackHome={() => {
            setBalance(b => b + (parseFloat(fundAmount) || 0));
            setForTitle('');
            setFundAmount('');
            navigate('ways-to-pay', 'forward');
          }}
        />;
      case 'success':
        return <SuccessScreen
          amount={fundAmount}
          onBackHome={() => {
            setBalance(b => b + (parseFloat(fundAmount) || 0));
            setForTitle('');
            setFundAmount('');
            navigate('ways-to-pay', 'forward');
          }}
        />;
      case 'add-to-wallet':
        return <AddToWalletScreen
          onBack={() => back(addMethodOrigin)}
          onSelect={(id) => {
            if (id === 'bank') { go('plaid'); }
            else { setSelectedCardType(id); go('scan-card'); }
          }}
        />;
      case 'plaid':
        return <PlaidScreen
          onBack={() => {
            if (addMethodOrigin === 'withdraw-list') back('withdraw-list');
            else if (addMethodOrigin === 'withdraw-accounts') back('withdraw-accounts');
            else back('add-to-wallet');
          }}
          onAddAccount={onPlaidAddAccount}
        />;
      case 'scan-card':
        return <ScanCardScreen
          onBack={() => back('add-to-wallet')}
          onManual={() => go('add-manually')}
          onScanned={() => go('card-details')}
        />;
      case 'card-details':
        return <CardDetailsScreen onBack={() => back('scan-card')} onContinue={onAdded} />;
      case 'add-manually':
        return <AddManuallyScreen onBack={() => back('scan-card')} onContinue={onAdded} />;
      default: return null;
    }
  };

  const exitClass  = transitionType === 'fade' ? '' : (direction === 'back' ? 'slide-exit-right' : 'slide-exit-left');
  const enterClass = transitionType === 'fade' ? 'fade-in' : (direction === 'back' ? 'slide-enter-left' : 'slide-enter-right');

  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center', minHeight:'100vh', background:'#0e0e0e', padding:24 }}>
      <div className="phone">

        {inTransition && prevScreen && (
          <div key={`exit-${navKey}`} className={`screen-wrap ${exitClass}`} style={{ zIndex:1 }}>
            {buildScreen(prevScreen)}
          </div>
        )}

        <div key={`enter-${navKey}`}
          className={`screen-wrap${inTransition ? ` ${enterClass}` : ''}`}
          style={{ zIndex: inTransition ? 2 : 1 }}
          onAnimationEnd={inTransition ? () => { inTransRef.current = false; setInTransition(false); } : undefined}
        >
          {buildScreen(screen)}
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
